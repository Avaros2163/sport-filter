<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Многофакторный Фильтр LIVE и Прематч (РЕАЛЬНОЕ API)</title>
<style>
:root {
    --bg-color: #060709; --card-bg: #10121a; --panel-bg: #0d0f15;
    --winline-orange: #ff5500; --text-color: #cbd5e1; --text-title: #ffffff;
    --factor-border: #202637; --green: #2ecc71; --red: #e74c3c;
}
body {
    font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color);
    margin: 0; padding: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; height: 100vh; box-sizing: border-box;
}
.app-wrapper {
    width: 95%; max-width: 1200px; height: 90vh; background: var(--panel-bg);
    border: 1px solid var(--factor-border); border-radius: 12px; padding: 15px;
    display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.7); box-sizing: border-box;
}
header { text-align: center; border-bottom: 2px solid var(--winline-orange); padding-bottom: 8px; }
h1 { color: var(--text-title); margin: 0 0 5px 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
.search-bar-container { display: flex; justify-content: center; margin: 10px 0; }
.search-input {
    width: 100%; max-width: 500px; padding: 10px 15px; font-size: 15px;
    background-color: var(--card-bg); border: 1px solid var(--factor-border);
    border-radius: 20px; color: #fff; outline: none; text-align: center;
}
.live-counter-panel { background: #11141d; border: 1px solid var(--winline-orange); border-radius: 6px; padding: 6px; text-align: center; font-size: 12px; font-weight: bold; color: #fff; margin-bottom: 10px; }
.main-split-panel { display: flex; flex: 1; gap: 15px; overflow: hidden; }
.panel-half {
    flex: 1; width: 50%; border-radius: 8px; padding: 15px; overflow-y: auto;
    display: flex; flex-direction: column; box-sizing: border-box; background: #060709; border: 1px solid var(--factor-border);
}
.column-title { font-size: 13px; font-weight: bold; color: var(--text-title); border-bottom: 1px solid var(--factor-border); padding-bottom: 6px; margin-bottom: 10px; text-transform: uppercase; }
.match-card { background: var(--card-bg); padding: 15px; margin-bottom: 8px; border-radius: 6px; border-left: 5px solid #475569; cursor: pointer; display: flex; flex-direction: column; transition: all 0.2s; }
.match-card:hover { border-left-color: var(--winline-orange); background: #151924; }
.match-header { display: flex; justify-content: space-between; font-size: 10px; color: #64748b; margin-bottom: 8px; }
.teams { font-size: 14px; font-weight: bold; color: #fff; }
.placeholder-text { color: #64748b; text-align: center; margin: auto; font-size: 13px; font-style: italic; }

.verdict-box { background: var(--card-bg); border: 1px solid var(--factor-border); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
.verdict-title { font-size: 16px; font-weight: bold; color: #fff; border-bottom: 1px solid var(--factor-border); padding-bottom: 8px; text-align: center; }
.stats-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px dashed #1e293b; }
.signal-banner { padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 14px; text-transform: uppercase; margin-top: 5px; }
.signal-banner.good { background: rgba(46, 204, 113, 0.15); color: var(--green); border: 1px solid var(--green); }
.signal-banner.neutral { background: rgba(52, 152, 219, 0.15); color: #3498db; border: 1px solid #3498db; }
.bot-votes-bar { display: flex; height: 20px; border-radius: 4px; overflow: hidden; margin-top: 10px; font-size: 10px; font-weight: bold; text-align: center; line-height: 20px; color: #fff; }
</style>
</head>
<body>
<div class="app-wrapper">
    <header><h1>Многофакторный Фильтр Анализа Матчей</h1></header>
    <div class="search-bar-container"><input type="text" id="live-search" class="search-input" placeholder="Введите теннисиста или команду для поиска в реальной сети..."></div>
    <div class="live-counter-panel" id="counter-text">ПОДКЛЮЧЕНИЕ К ЖИВОМУ МИРОВОМУ СПОРТИВНОМУ АГРЕГАТОРУ...</div>
    <div class="main-split-panel">
        <div class="panel-half">
            <div class="column-title">Настоящая линия матчей на 7 дней вперед (Прематч)</div>
            <div id="left-matches-list"><div class="placeholder-text">Загрузка спортивного канала...</div></div>
        </div>
        <div class="panel-half" style="background:#10121a;">
            <div class="column-title">Аналитический Консилиум 50 Ботов</div>
            <div id="right-verdict-box" class="placeholder-text">Выберите реальный матч из левой панели для запуска 50 ИИ-ботов...</div>
        </div>
    </div>
</div>
<script>
let globalCachedMatches = [];
let currentSearchQuery = "";
let selectedMatchId = null;

// ТВОЙ ЖЕЛЕЗОБЕТОННЫЙ КЛЮЧ ДОСТУПА С ПОЧТЫ
const MY_API_KEY = "50b2db74a540b41486d1adcebb0926dd"; 

function poisson(k, lambda) {
    return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
}
function factorial(n) {
    if (n === 0 || n === 1) return 1;
    let res = 1; for (let i = 2; i <= n; i++) res *= i; return res;
}

function run50BotsConsilium(match) {
    let positiveVotes = 0; let negativeVotes = 0; let neutralVotes = 0;
    const o = match.odds;
    const isTwoWay = o.X === "-";
    let margin = isTwoWay ? ((1 / o.P1) + (1 / o.P2) - 1) : ((1 / o.P1) + (1 / o.X) + (1 / o.P2) - 1);
    const sumImplied = isTwoWay ? ((1 / o.P1) + (1 / o.P2)) : ((1 / o.P1) + (1 / o.X) + (1 / o.P2));
    
    let fairA = (1 / o.P1) / sumImplied;
    let fairB = (1 / o.P2) / sumImplied;
    let fairX = isTwoWay ? 0 : ((1 / o.X) / sumImplied);

    for (let botId = 1; botId <= 50; botId++) {
        let botVerdict = 0;
        if (botId <= 10) {
            let pA = poisson(2, fairA * 2.5); if (pA > 0.30) botVerdict = 1; else botVerdict = -1;
        } else if (botId <= 20) {
            if (fairA > 0.48) botVerdict = 1; else if (fairB > 0.48) botVerdict = -1;
        } else if (botId <= 30) {
            if (fairA > fairB) botVerdict = 1; else botVerdict = -1;
        } else if (botId <= 40) {
            if (fairA > 0.55) botVerdict = 1; else if (fairB > 0.55) botVerdict = -1;
        } else {
            let bayesA = (fairA * 0.6) / ((fairA * 0.6) + (fairB * 0.4)); if (bayesA > 0.52) botVerdict = 1; else botVerdict = -1;
        }
        if (botVerdict === 1) positiveVotes++; else if (botVerdict === -1) negativeVotes++; else neutralVotes++;
    }

    let recommendedOutcome = `Консенсус не достигнут. Силы сторон равны.`;
    let bannerClass = "neutral";
    if (positiveVotes >= 35) { recommendedOutcome = `РЕКОМЕНДАЦИЯ: Победа Первого участника (Одобрено ботами: ${positiveVotes}/50)`; bannerClass = "good"; }
    else if (negativeVotes >= 35) { recommendedOutcome = `РЕКОМЕНДАЦИЯ: Победа Второго участника (Одобрено ботами: ${negativeVotes}/50)`; bannerClass = "good"; }

    return {
        ...match, margin: (margin * 100).toFixed(2) + "%",
        probA: (fairA * 100).toFixed(1) + "%", probB: (fairB * 100).toFixed(1) + "%",
        probX: isTwoWay ? "-" : (fairX * 100).toFixed(1) + "%",
        verdictText: recommendedOutcome, bannerClass: bannerClass, botStats: { yes: positiveVotes, no: negativeVotes, neutral: neutralVotes }
    };
}
async function fetchRealSportsLine(sportKey) {
    try {
        // Качаем НАСТОЯЩУЮ линию матчей на 7 дней вперед напрямую без прокси прокладок
        const url = `https://theoddsapi.com{sportKey}/odds/?apiKey=${MY_API_KEY}&regions=eu&markets=h2h`;
        const response = await fetch(url);
        if (!response.ok) return [];
        const data = await response.json();
        
        let result = [];
        if (data && Array.isArray(data)) {
            data.forEach(item => {
                let bookmaker = item.bookmakers?.[0];
                let market = bookmaker?.markets?.[0];
                let outcomes = market?.outcomes || [];
                
                let p1 = outcomes.find(o => o.name === item.home_team)?.price || 1.85;
                let p2 = outcomes.find(o => o.name === item.away_team)?.price || 1.85;
                let x = outcomes.find(o => o.name !== item.home_team && o.name !== item.away_team)?.price || "-";

                let mDate = new Date(item.commence_time);
                result.push({
                    id: item.id,
                    sport: item.sport_title === "Tennis" ? "Теннис" : (item.sport_title.includes("Ice Hockey") ? "Хоккей" : "Футбол"),
                    league: item.sport_title, home: item.home_team, away: item.away_team,
                    p1Odds: p1, p2Odds: p2, xOdds: x,
                    dateStr: mDate.toLocaleDateString("ru-RU"), time: mDate.toLocaleTimeString("ru-RU", {hour: '2-digit', minute:'2-digit'}),
                    timestamp: mDate.getTime()
                });
            });
        }
        return result;
    } catch (e) { return []; }
}

function renderMatches() {
    const listContainer = document.getElementById("left-matches-list");
    if (globalCachedMatches.length === 0) { listContainer.innerHTML = '<div class="placeholder-text">Синхронизация с серверами спортивных данных...</div>'; return; }
    let filtered = globalCachedMatches.filter(m => {
        let searchStr = `${m.home} ${m.away} ${m.league} ${m.sport}`.toLowerCase();
        return searchStr.includes(currentSearchQuery.toLowerCase());
    });
    if (filtered.length === 0) { listContainer.innerHTML = '<div class="placeholder-text">Настоящих матчей по вашему запросу не найдено...</div>'; return; }
    listContainer.innerHTML = filtered.map(m => `
        <div class="match-card" onclick="selectMatch('${m.id}')">
            <div class="match-header"><span>${m.sport.toUpperCase()} | ${m.league}</span><strong>${m.dateStr} — ${m.time}</strong></div>
            <div class="teams">${m.home} — ${m.away}</div>
        </div>
    `).join('');
}

function selectMatch(id) { selectedMatchId = id; updateVerdictPanel(); }

function updateVerdictPanel() {
    const box = document.getElementById("right-verdict-box");
    const rawMatch = globalCachedMatches.find(m => m.id == selectedMatchId);
    if (!rawMatch) return;
    const match = run50BotsConsilium(rawMatch);
    box.innerHTML = `
        <div class="verdict-box">
            <div class="verdict-title">${match.home} — ${match.away}</div>
            <div class="stats-row"><span>Вид спорта:</span><strong>${match.sport}</strong></div>
            <div class="stats-row"><span>Турнир:</span><strong>${match.league}</strong></div>
            <div class="stats-row"><span>Маржа букмекера:</span><strong>${match.margin}</strong></div>
            <div class="stats-row"><span>Вероятность П1:</span><strong>${match.probA}</strong></div>
            <div class="stats-row"><span>Вероятность X:</span><strong>${match.probX}</strong></div>
            <div class="stats-row"><span>Вероятность П2:</span><strong>${match.probB}</strong></div>
            <div class="signal-banner ${match.bannerClass}">${match.verdictText}</div>
            <div style="font-size:11px;color:#64748b;margin-top:5px;text-align:center;">ОБСЧЕТ 50 МАТЕМАТИЧЕСКИХ БОТОВ:</div>
            <div class="bot-votes-bar">
                <div style="background:var(--green);width:${(match.botStats.yes/50)*100}%">${match.botStats.yes}</div>
                <div style="background:#475569;width:${(match.botStats.neutral/50)*100}%">${match.botStats.neutral}</div>
                <div style="background:var(--red);width:${(match.botStats.no/50)*100}%">${match.botStats.no}</div>
            </div>
        </div>
    `;
}

async function startLiveSync() {
    // Подгружаем реальные пулы данных со всех мировых теннисных, футбольных и хоккейных событий
    const [tennis, football, hockey] = await Promise.all([
        fetchRealSportsLine("tennis_atp_wimbledon"),
        fetchRealSportsLine("soccer_russia_premier_league"),
        fetchRealSportsLine("icehockey_russia_khl")
    ]);
    let combined = [...tennis, ...football, ...hockey];
    if (combined.length > 0) {
        globalCachedMatches = combined.sort((a, b) => a.timestamp - b.timestamp);
        document.getElementById("counter-text").innerText = `ЖИВОЙ МИРОВОЙ СПОРТИВНЫЙ ПОТОК АКТИВЕН // ВСЕГО НАСТОЯЩИХ МАТЧЕЙ В СЕТКЕ: ${globalCachedMatches.length}`;
        renderMatches();
    }
    setTimeout(startLiveSync, 60000);
}

document.getElementById("live-search").addEventListener("input", (e) => {
    currentSearchQuery = e.target.value; renderMatches();
});
window.onload = startLiveSync;
</script>
</body>
</html>
