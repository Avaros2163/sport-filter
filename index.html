<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Многофакторный Фильтр LIVE и Прематч</title>
<style>
:root {
    --bg-color: #060709; --card-bg: #10121a; --panel-bg: #0d0f15;
    --winline-orange: #ff5500; --text-color: #cbd5e1; --text-title: #ffffff;
    --factor-border: #202637; --green: #2ecc71; --red: #e74c3c;
}
body {
    font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color);
    margin: 0; padding: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; height: 100vh; box-sizing: border-box;
}
.app-wrapper {
    width: 95%; max-width: 1200px; height: 90vh; background: var(--panel-bg);
    border: 1px solid var(--factor-border); border-radius: 12px; padding: 15px;
    display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.7); box-sizing: border-box;
}
header { text-align: center; border-bottom: 2px solid var(--winline-orange); padding-bottom: 8px; }
h1 { color: var(--text-title); margin: 0 0 5px 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
.search-bar-container { display: flex; justify-content: center; margin: 10px 0; }
.search-input {
    width: 100%; max-width: 500px; padding: 10px 15px; font-size: 15px;
    background-color: var(--card-bg); border: 1px solid var(--factor-border);
    border-radius: 20px; color: #fff; outline: none; text-align: center;
}
.live-counter-panel { background: #11141d; border: 1px solid var(--winline-orange); border-radius: 6px; padding: 6px; text-align: center; font-size: 12px; font-weight: bold; color: #fff; margin-bottom: 10px; }
.main-split-panel { display: flex; flex: 1; gap: 15px; overflow: hidden; }
.panel-half {
    flex: 1; width: 50%; border-radius: 8px; padding: 15px; overflow-y: auto;
    display: flex; flex-direction: column; box-sizing: border-box; background: #060709; border: 1px solid var(--factor-border);
}
.column-title { font-size: 13px; font-weight: bold; color: var(--text-title); border-bottom: 1px solid var(--factor-border); padding-bottom: 6px; margin-bottom: 10px; text-transform: uppercase; }
.match-card { background: var(--card-bg); padding: 12px; margin-bottom: 8px; border-radius: 6px; border-left: 5px solid #475569; cursor: pointer; display: flex; flex-direction: column; }
.match-card.status-good { border-left-color: var(--green); box-shadow: 0 0 10px rgba(46, 204, 113, 0.2); }
.match-card.status-bad { border-left-color: var(--red); opacity: 0.6; }
.match-header { display: flex; justify-content: space-between; font-size: 10px; color: #64748b; margin-bottom: 5px; }
.teams { font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 8px; }
.odds-line { display: flex; gap: 4px; background: #151821; padding: 5px; border-radius: 4px; font-size: 11px; }
.odds-box { flex: 1; text-align: center; }
.odds-box span { color: #64748b; display: block; font-size: 8px; }
.odds-box strong { color: var(--winline-orange); }
.placeholder-text { color: #64748b; text-align: center; margin: auto; font-size: 13px; font-style: italic; }

.verdict-box { background: var(--card-bg); border: 1px solid var(--factor-border); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
.verdict-title { font-size: 16px; font-weight: bold; color: #fff; border-bottom: 1px solid var(--factor-border); padding-bottom: 8px; }
.stats-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px dashed #1e293b; }
.signal-banner { padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 14px; text-transform: uppercase; }
.signal-banner.good { background: rgba(46, 204, 113, 0.15); color: var(--green); border: 1px solid var(--green); }
.signal-banner.bad { background: rgba(231, 76, 60, 0.15); color: var(--red); border: 1px solid var(--red); }
.bot-votes-bar { display: flex; height: 20px; border-radius: 4px; overflow: hidden; margin-top: 10px; font-size: 10px; font-weight: bold; text-align: center; line-height: 20px; color: #fff; }
</style>
</head>
<body>
<div class="app-wrapper">
    <header><h1>Многофакторный Фильтр LIVE/Прематч</h1></header>
    <div class="search-bar-container"><input type="text" id="live-search" class="search-input" placeholder="Поиск по команде, лиге или виду спорта..."></div>
    <div class="live-counter-panel" id="counter-text">ЗАПУСК СИНХРОНИЗАЦИИ ЛИНИИ WINLINE...</div>
    <div class="main-split-panel">
        <div class="panel-half">
            <div class="column-title">Линия LIVE и Прематч (Сортировка по времени)</div>
            <div id="left-matches-list"><div class="placeholder-text">Ожидание первого ответа от сервера...</div></div>
        </div>
        <div class="panel-half" style="background:#10121a;">
            <div class="column-title">Аналитический Консилиум</div>
            <div id="right-verdict-box" class="placeholder-text">Выберите активный матч из левой панели для запуска 50 ИИ-ботов...</div>
        </div>
    </div>
</div>
<script>
let globalCachedMatches = [];
let currentSearchQuery = "";
let selectedMatchId = null;

const translateDict = {
    "football": "Футбол", "hockey": "Хоккей", "basketball": "Баскетбол", "tennis": "Теннис",
    "live": "LIVE", "corner": "Угловые", "yellow cards": "Желтые карточки", "points": "Очки"
};
function translateToRu(text) {
    if (!text) return "Разное";
    let lower = text.toLowerCase();
    for (let key in translateDict) { if (lower.includes(key)) return translateDict[key]; }
    return text;
}

function poisson(k, lambda) {
    return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
}
function factorial(n) {
    if (n === 0 || n === 1) return 1;
    let res = 1; for (let i = 2; i <= n; i++) res *= i; return res;
}

function analyzeMatchWith50Bots(match) {
    const o = match.odds;
    const isTwoWay = o.X === "-";
    let margin = isTwoWay ? ((1 / o.P1) + (1 / o.P2) - 1) : ((1 / o.P1) + (1 / o.X) + (1 / o.P2) - 1);
    const marginPercent = margin * 100;

    const translatedMatch = {
        ...match, sport: translateToRu(match.sport), league: translateToRu(match.league), home: translateToRu(match.home), away: translateToRu(match.away)
    };

    if (marginPercent > 7.5) {
        return {
            ...translatedMatch, status: "status-bad", margin: marginPercent.toFixed(2) + "%",
            fairProbabilities: { P1: "0%", X: isTwoWay ? "-" : "0%", P2: "0%" }, verdict: "БЛОКИРОВКА",
            verdictText: `БЛОКИРОВКА: Высокая маржа (${marginPercent.toFixed(2)}%). Букмекер грабит банк. Пропуск!`,
            botStats: { yes: 0, no: 0, neutral: 50 }
        };
    }

    const sumImplied = isTwoWay ? ((1 / o.P1) + (1 / o.P2)) : ((1 / o.P1) + (1 / o.X) + (1 / o.P2));
    const fairP1 = (1 / o.P1) / sumImplied; const fairP2 = (1 / o.P2) / sumImplied; const fairX = isTwoWay ? 0 : ((1 / o.X) / sumImplied);

    let positiveVotes = 0; let negativeVotes = 0; let neutralVotes = 0;

    for (let botId = 1; botId <= 50; botId++) {
        let botVerdict = 0;
        if (botId <= 10) {
            const lambdaHome = fairP1 * 2.1; const lambdaAway = fairP2 * 1.8; let p1WinPoisson = 0;
            for (let h = 0; h <= 4; h++) { for (let a = 0; a < h; a++) { p1WinPoisson += poisson(h, lambdaHome) * poisson(a, lambdaAway); } }
            if (p1WinPoisson > 0.45) botVerdict = 1; else if (p1WinPoisson < 0.25) botVerdict = -1;
        } else if (botId <= 20) {
            const b = o.P1 - 1; const kellyP1 = (b * fairP1 - (1 - fairP1)) / b;
            if (kellyP1 > 0.05) botVerdict = 1; else if (fairP2 > 0.55) botVerdict = -1;
        } else if (botId <= 30) {
            if (margin < 0.04 && fairP1 > 0.50) botVerdict = 1; else if (margin < 0.04 && fairP2 > 0.50) botVerdict = -1;
        } else if (botId <= 40) {
            if (o.P1 < 1.60 && fairP1 > 0.65) botVerdict = 1; else if (o.P2 < 1.60 && fairP2 > 0.65) botVerdict = -1;
        } else {
            const timeModifier = match.time === "LIVE" ? 45 : (parseInt(match.time) || 0);
            const bayesP1 = (fairP1 * (timeModifier / 90 || 0.5)) / ((fairP1 * (timeModifier / 90 || 0.5)) + (fairP2 * (1 - (timeModifier / 90 || 0.5))));
            if (bayesP1 > 0.60) botVerdict = 1; else if (bayesP1 < 0.30) botVerdict = -1;
        }
        if (botVerdict === 1) positiveVotes++; else if (botVerdict === -1) negativeVotes++; else neutralVotes++;
    }

    let finalStatus = "status-normal"; let recommendedOutcome = "Пропустить матч (Нет консенсуса ботов)";
    if (positiveVotes >= 40) { finalStatus = "status-good"; recommendedOutcome = `СТАВКА: П1. Одобрено ботами: ${positiveVotes}/50.`; }
    else if (negativeVotes >= 40) { finalStatus = "status-good"; recommendedOutcome = `СТАВКА: П2. Одобрено ботами: ${negativeVotes}/50.`; }

    return {
        ...translatedMatch, status: finalStatus, margin: marginPercent.toFixed(2) + "%",
        fairProbabilities: { P1: (fairP1 * 100).toFixed(1) + "%", X: isTwoWay ? "-" : (fairX * 100).toFixed(1) + "%", P2: (fairP2 * 100).toFixed(1) + "%" },
        verdict: finalStatus === "status-good" ? "СТАВКА" : "ПРОПУСК", verdictText: recommendedOutcome, botStats: { yes: positiveVotes, no: negativeVotes, neutral: neutralVotes }
    };
}
async function fetchWinlineData(endpoint) {
    try {
        // Запрос к живому API Winline через высокоскоростное облачное зеркало allorigins
        const url = "https://allorigins.win" + encodeURIComponent("https://winline.ru" + endpoint) + "&nocache=" + Date.now();
        const response = await fetch(url);
        if (!response.ok) return [];
        const raw = await response.json();
        if (!raw || !raw.contents) return [];
        const data = JSON.parse(raw.contents);
        
        let processed = []; const sportMap = { 1: "football", 2: "hockey", 3: "basketball", 4: "tennis" };
        if (data && data.stages) {
            for (let stage of data.stages) {
                let sportId = stage.sportId; if (!sportMap[sportId]) continue;
                let items = stage.items || [];
                for (let item of items) {
                    if (!item.homeTeam || !item.awayTeam) continue;
                    let outcomes = item.outcomes || {};
                    processed.push({
                        id: item.id, sport: sportMap[sportId], league: stage.name || "Разное", home: item.homeTeam.name, away: item.awayTeam.name,
                        odds: { P1: parseFloat(outcomes["1"]?.value || 1.01), X: outcomes["2"]?.value ? parseFloat(outcomes["2"].value) : "-", P2: parseFloat(outcomes["3"]?.value || 1.01) },
                        timestamp: item.time?.startTime || Date.now(), dateStr: item.time?.startDateStr || "Сегодня", time: endpoint.includes("live") ? "LIVE" : (item.time?.startTimeStr || "Прематч")
                    });
                }
            }
        }
        return processed;
    } catch (e) { return []; }
}

function renderMatches() {
    const listContainer = document.getElementById("left-matches-list");
    if (globalCachedMatches.length === 0) { listContainer.innerHTML = '<div class="placeholder-text">Синхронизация потока Winline...</div>'; return; }

    let filtered = globalCachedMatches.filter(m => {
        let searchStr = `${m.home} ${m.away} ${m.league} ${m.sport}`.toLowerCase();
        return searchStr.includes(currentSearchQuery.toLowerCase());
    });

    if (filtered.length === 0) { listContainer.innerHTML = '<div class="placeholder-text">Нет активных матчей по запросу...</div>'; return; }
    
    listContainer.innerHTML = filtered.map(m => `
        <div class="match-card ${m.status}" onclick="selectMatch('${m.id}')">
            <div class="match-header"><span>${m.sport.toUpperCase()} | ${m.league}</span><strong>${m.dateStr} — ${m.time}</strong></div>
            <div class="teams">${m.home} — ${m.away}</div>
            <div class="odds-line">
                <div class="odds-box"><span>П1</span><strong>${m.odds.P1}</strong></div>
                <div class="odds-box"><span>X</span><strong>${m.odds.X}</strong></div>
                <div class="odds-box"><span>П2</span><strong>${m.odds.P2}</strong></div>
            </div>
        </div>
    `).join('');
    if (selectedMatchId) { updateVerdictPanel(); }
}

function selectMatch(id) { selectedMatchId = id; updateVerdictPanel(); }

function updateVerdictPanel() {
    const box = document.getElementById("right-verdict-box");
    const match = globalCachedMatches.find(m => m.id == selectedMatchId);
    if (!match) { box.innerHTML = '<div class="placeholder-text">Матч завершился или пропал из линии...</div>'; return; }
    const isGood = match.status === "status-good"; const isBad = match.status === "status-bad";
    let bannerClass = "neutral"; if (isGood) bannerClass = "good"; if (isBad) bannerClass = "bad";
    box.innerHTML = `
        <div class="verdict-box">
            <div class="verdict-title">${match.home} — ${match.away}</div>
            <div class="stats-row"><span>Вид спорта:</span><strong>${match.sport}</strong></div>
            <div class="stats-row"><span>Текущая маржа букмекера:</span><strong>${match.margin}</strong></div>
            <div class="stats-row"><span>Честная вероятность П1:</span><strong>${match.fairProbabilities.P1}</strong></div>
            <div class="stats-row"><span>Честная вероятность X:</span><strong>${match.fairProbabilities.X}</strong></div>
            <div class="stats-row"><span>Честная вероятность П2:</span><strong>${match.fairProbabilities.P2}</strong></div>
            <div class="signal-banner ${bannerClass}">${match.verdictText}</div>
            <div style="font-size:11px;color:#64748b;margin-top:5px;text-align:center;">РАСПРЕДЕЛЕНИЕ ГОЛОСОВ 50 БОТОВ:</div>
            <div class="bot-votes-bar">
                <div style="background:var(--green);width:${(match.botStats.yes/50)*100}%">${match.botStats.yes > 0 ? match.botStats.yes : ''}</div>
                <div style="background:#475569;width:${(match.botStats.neutral/50)*100}%">${match.botStats.neutral > 0 ? match.botStats.neutral : ''}</div>
                <div style="background:var(--red);width:${(match.botStats.no/50)*100}%">${match.botStats.no > 0 ? match.botStats.no : ''}</div>
            </div>
        </div>
    `;
}

async function startLiveSync() {
    const [liveData, prematchData] = await Promise.all([
        fetchWinlineData("live/short"),
        fetchWinlineData("prematch/short")
    ]);
    let combinedRaw = [];
    const sportMap = { 1: "football", 2: "hockey", 3: "basketball", 4: "tennis" };
    const parseData = (data, isLive) => {
        if (data && data.stages) {
            for (let stage of data.stages) {
                let sportId = stage.sportId; if (!sportMap[sportId]) continue;
                let items = stage.items || [];
                for (let item of items) {
                    if (!item.homeTeam || !item.awayTeam) continue;
                    let outcomes = item.outcomes || {};
                    combinedRaw.push({
                        id: item.id, sport: sportMap[sportId], league: stage.name || "Разное", home: item.homeTeam.name, away: item.awayTeam.name,
                        odds: { P1: parseFloat(outcomes["1"]?.value || 1.01), X: outcomes["2"]?.value ? parseFloat(outcomes["2"].value) : "-", P2: parseFloat(outcomes["3"]?.value || 1.01) },
                        timestamp: item.time?.startTime || Date.now(), dateStr: item.time?.startDateStr || "Сегодня", time: isLive ? "LIVE" : (item.time?.startTimeStr || "Прематч")
                    });
                }
            }
        }
    };
    parseData(liveData, true); parseData(prematchData, false);
    if (combinedRaw.length > 0) {
        const sorted = combinedRaw.sort((a, b) => a.timestamp - b.timestamp);
        globalCachedMatches = sorted.map(m => analyzeMatchWith50Bots(m));
        document.getElementById("counter-text").innerText = `СИНХРОНИЗАЦИЯ ПОТОКА АКТИВНА // ВСЕГО НАСТОЯЩИХ МАТЧЕЙ (НЕДЕЛЯ): ${globalCachedMatches.length}`;
        renderMatches();
    }
    setTimeout(startLiveSync, 9000); // Опрос раз в 9 секунд для стабильности шлюза на бесплатном хостинге
}
document.getElementById("live-search").addEventListener("input", (e) => {
    currentSearchQuery = e.target.value; renderMatches();
});
window.onload = startLiveSync;
</script>
</body>
</html>
