name: Auto Update Winline Line

on:
  schedule:
    - cron: '*/15 * * * *' # Сервер сам заходит на Winline каждые 15 минут
  workflow_dispatch: # Кнопка ручного пинка

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v3

    - name: Настройка Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Установка системного браузера Playwright
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install --with-deps chromium

    - name: Запуск робота-граббера Winline
      run: python smart_robot.py

    - name: Публикация оригинальной линии на сайт
      run: |
        git config --global user.name "Winline Robot"
        git config --global user.email "robot@winline.ru"
        git add line.json
        git commit -m "Автопилот: загрузка свежей линии Winline" || true
        git push origin main
